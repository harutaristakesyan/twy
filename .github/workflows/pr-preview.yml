name: PR Preview — Deploy to Dev

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "24"
  STAGE: dev

concurrency:
  group: pr-deploy-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .

  build:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  deploy-dev:
    needs: [build]
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT_ID }}:role/github-deploy-role
          aws-region: ${{ env.AWS_REGION }}
      - name: SST unlock
        run: pnpm sst unlock --stage "$STAGE"
      - name: SST deploy
        run: pnpm sst deploy --stage "$STAGE"
      - name: Run DB migrations
        run: pnpm sst shell --stage "$STAGE" -- pnpm --filter @twy/db migrate
      - name: Seed team permissions
        run: pnpm sst shell --stage "$STAGE" -- pnpm --filter @twy/db seed:permissions
      - name: Comment deployment URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Dev deployment complete**\n\n- Dashboard: https://dev.twy.am\n- API: https://dev.twy.be'
            })
