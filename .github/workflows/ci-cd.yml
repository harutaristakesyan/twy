name: CI/CD

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .

  build:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - { name: dev, account_var: DEV_ACCOUNT_ID, region: us-east-1 }
          # - { name: prod, account_var: PROD_ACCOUNT_ID, region: us-east-1 }
    environment: ${{ matrix.environment.name }}
    concurrency:
      group: deploy-${{ matrix.environment.name }}-${{ github.ref }}
    env:
      AWS_REGION: ${{ matrix.environment.region }}
      STAGE: ${{ matrix.environment.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars[matrix.environment.account_var] }}:role/github-deploy-role
          aws-region: ${{ matrix.environment.region }}
      - name: SST deploy
        run: pnpm sst deploy --stage "$STAGE"
      - name: Run DB migrations
        run: pnpm sst shell --stage "$STAGE" -- pnpm --filter @twy/db migrate
